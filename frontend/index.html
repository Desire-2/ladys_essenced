<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Lady's Essence — Women's Health, Cycle Tracking & Family Care</title>
    <meta
      name="description"
      content="Lady's Essence is a women's health platform for adolescent girls and parents. Track menstrual cycles, log nutrition, book clinic appointments, and get AI-guided wellness support."
    />
    <meta
      name="keywords"
      content="Lady's Essence, women's health, menstrual cycle tracking, period tracker, adolescent health, parent dashboard, telemedicine, Rwanda health, reproductive wellness, Umwari"
    />
    <meta name="author" content="Lady's Essence" />
    <meta name="application-name" content="Lady's Essence" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#C4785A" />

    <!-- Canonical & language (set VITE_SITE_URL in production .env) -->
    <link rel="canonical" href="https://ladys-essenced.vercel.app/" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lady's Essence" />
    <meta property="og:title" content="Lady's Essence — Women's Health & Cycle Tracking" />
    <meta
      property="og:description"
      content="Track cycles, manage family health, book provider appointments, and access trusted guidance — built for girls, parents, and clinicians."
    />
    <meta property="og:image" content="https://ladys-essenced.vercel.app/logo.svg" />
    <meta property="og:url" content="https://ladys-essenced.vercel.app/" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Lady's Essence — Women's Health & Cycle Tracking" />
    <meta
      name="twitter:description"
      content="Track cycles, manage family health, book provider appointments, and access trusted guidance."
    />
    <meta name="twitter:image" content="https://ladys-essenced.vercel.app/logo.svg" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Lady's Essence",
        "description": "Women's health application for cycle tracking, nutrition logging, clinic appointments, and family health management.",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
